name: Latest Blog Posts
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: ""
          max_post_count: 5
          comment_tag_name: BLOG-POST-LIST
          commit_message: "Update latest blog posts"
